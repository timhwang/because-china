<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Because China</title>
  <meta property="og:title" content="Because China">
  <meta property="og:description" content="Justify anything through the lens of great power competition.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Because China">
  <meta name="twitter:description" content="Justify anything through the lens of great power competition.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f0e8;
      color: #1a1a1a;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
    }

    .header {
      background-color: #1a1a1a;
      padding: 14px 0;
      text-align: center;
      border-bottom: 3px solid #c41e3a;
    }

    .header-title {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4a017;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 56px;
      line-height: 1.05;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .hero h1 .red {
      color: #c41e3a;
    }

    .hero .subtitle {
      font-family: 'Libre Baskerville', serif;
      font-size: 19px;
      font-style: italic;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .hero .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c41e3a;
      margin-top: 16px;
    }

    .input-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 20px 60px;
      text-align: center;
    }

    .input-label {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c41e3a;
      margin-bottom: 12px;
      display: block;
    }

    .input-box {
      width: 100%;
      font-family: 'Libre Baskerville', serif;
      font-size: 18px;
      padding: 20px 24px;
      border: 3px solid #c41e3a;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-box::placeholder {
      color: #b0a898;
      font-style: italic;
    }

    .input-box:focus {
      border-color: #8b1425;
    }

    .generate-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #c41e3a;
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.2s ease;
    }

    .generate-btn:hover {
      background: #8b1425;
      transform: translateY(-1px);
    }

    .generate-btn:disabled {
      background: #d4a4a4;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: none;
      margin-top: 40px;
      text-align: center;
    }

    .loading .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(196, 30, 58, 0.2);
      border-top-color: #c41e3a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 17px;
      color: #666;
      margin-top: 16px;
    }

    .result {
      display: none;
      max-width: 680px;
      margin: 0 auto 80px;
      padding: 0 20px;
    }

    .result-card {
      background: #fff;
      border-radius: 12px;
      padding: 48px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      border-top: 4px solid #c41e3a;
    }

    .result-premise-label {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      background: #c41e3a;
      padding: 4px 12px;
      border-radius: 3px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .result-premise {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 24px;
    }

    .result-divider {
      width: 60px;
      height: 3px;
      background: #d4a017;
      margin-bottom: 24px;
    }

    .result-justification {
      font-family: 'Libre Baskerville', serif;
      font-size: 17px;
      line-height: 1.8;
      color: #333;
    }

    .result-justification p {
      margin-bottom: 16px;
    }

    .result-justification p:last-child {
      margin-bottom: 0;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .try-again-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: none;
      border: 2px solid #c41e3a;
      color: #c41e3a;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .try-again-btn:hover {
      background: #c41e3a;
      color: #fff;
    }

    .footer {
      text-align: center;
      padding: 24px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #999;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 36px;
      }

      .result-card {
        padding: 32px 24px;
      }

      .result-premise {
        font-size: 22px;
      }

      .result-actions {
        flex-direction: column;
        align-items: center;
      }

      .try-again-btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Strategic Imperative Assessment</div>
  </div>

  <div class="hero">
    <h1>Because <span class="red">China</span></h1>
    <p class="subtitle">Justify anything through the lens of great power competition.</p>
    <p class="tagline">A whole-of-society rationale generator</p>
  </div>

  <div class="input-section" id="inputSection">
    <label class="input-label" for="userInput">What do you need to justify?</label>
    <textarea class="input-box" id="userInput" placeholder="e.g. &quot;We need to invest in high-speed rail&quot; or &quot;I should buy a new espresso machine&quot;"></textarea>
    <button class="generate-btn" id="generateBtn">Justify It</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Consulting RAND, CSIS, and three former deputy assistant secretaries...</p>
  </div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="result-premise-label">Strategic Justification</div>
      <h2 class="result-premise" id="resultPremise"></h2>
      <div class="result-divider"></div>
      <p class="result-justification" id="resultJustification"></p>
    </div>
    <div class="result-actions">
      <button class="try-again-btn" id="tryAgainBtn">Justify Something Else</button>
    </div>
  </div>

  <script>
    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const API_URL = isLocal
      ? '/api/generate'
      : 'https://because-china.vercel.app/api/generate';

    const userInput = document.getElementById('userInput');
    const generateBtn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const inputSection = document.getElementById('inputSection');
    const resultPremise = document.getElementById('resultPremise');
    const resultJustification = document.getElementById('resultJustification');
    const tryAgainBtn = document.getElementById('tryAgainBtn');

    generateBtn.addEventListener('click', generate);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generate();
      }
    });

    async function generate() {
      const input = userInput.value.trim();
      if (!input) return;

      generateBtn.disabled = true;
      generateBtn.textContent = 'Justifying...';
      loading.style.display = 'block';
      result.style.display = 'none';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input }),
        });

        const data = await response.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
        }

        resultPremise.textContent = input;
        resultJustification.innerHTML = data.justification
          .split('\n\n')
          .filter(p => p.trim())
          .map(p => `<p>${p}</p>`)
          .join('');

        inputSection.style.display = 'none';
        result.style.display = 'block';
        result.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert('Something went wrong. Is the server running?');
        console.error(err);
      } finally {
        loading.style.display = 'none';
        generateBtn.disabled = false;
        generateBtn.textContent = 'Justify It';
      }
    }

    tryAgainBtn.addEventListener('click', () => {
      result.style.display = 'none';
      inputSection.style.display = 'block';
      userInput.value = '';
      userInput.focus();
    });

  </script>
</body>
</html>
