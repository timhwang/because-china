<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Because China</title>
  <meta property="og:title" content="Because China">
  <meta property="og:description" content="Justify anything through the lens of great power competition.">
  <meta property="og:image" content="https://because-china.vercel.app/og-image.png">
  <meta property="og:url" content="https://because-china.vercel.app/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://because-china.vercel.app/og-image.png">
  <meta name="twitter:title" content="Because China">
  <meta name="twitter:description" content="Justify anything through the lens of great power competition.">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f2f0e6;
      color: #111111;
      font-family: 'Jost', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: 'Jost', sans-serif;
      font-weight: 900;
      font-size: 56px;
      line-height: 1.05;
      color: #111111;
      margin-bottom: 16px;
    }

    .hero h1 .accent {
      color: #ff4400;
    }

    .hero .subtitle {
      font-family: 'Libre Baskerville', serif;
      font-size: 19px;
      font-style: italic;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .hero .tagline {
      font-family: 'Jost', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #223c6f;
      margin-top: 16px;
    }

    .input-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 20px 60px;
      text-align: center;
    }

    .input-label {
      font-family: 'Jost', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #223c6f;
      margin-bottom: 12px;
      display: block;
    }

    .input-box {
      width: 100%;
      font-family: 'Libre Baskerville', serif;
      font-size: 18px;
      padding: 20px 24px;
      border: 3px solid #223c6f;
      border-radius: 8px;
      background: #fff;
      color: #111111;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-box::placeholder {
      color: #b0a898;
      font-style: italic;
    }

    .input-box:focus {
      border-color: #ff4400;
    }

    .generate-btn {
      font-family: 'Jost', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #223c6f;
      color: #fff;
      border: 2px solid #223c6f;
      padding: 14px 48px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.2s ease;
    }

    .generate-btn:hover {
      background: transparent;
      color: #223c6f;
    }

    .generate-btn:disabled {
      background: #8a9bbd;
      border-color: #8a9bbd;
      color: #fff;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      margin-top: 40px;
      margin-bottom: 120px;
      text-align: center;
    }

    .loading .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(34, 60, 111, 0.2);
      border-top-color: #223c6f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 17px;
      color: #555;
      margin-top: 16px;
    }

    .result {
      display: none;
      max-width: 680px;
      margin: 0 auto 80px;
      padding: 0 20px;
    }

    .result-card {
      background: #fff;
      border-radius: 12px;
      padding: 48px;
      box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-top: 4px solid #223c6f;
    }

    .result-premise-label {
      font-family: 'Jost', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      background: #223c6f;
      padding: 4px 12px;
      border-radius: 3px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .result-premise {
      font-family: 'Jost', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: #111111;
      line-height: 1.3;
      margin-bottom: 24px;
    }

    .result-divider {
      width: 60px;
      height: 3px;
      background: #ff4400;
      margin-bottom: 24px;
    }

    .result-justification {
      font-family: 'Libre Baskerville', serif;
      font-size: 17px;
      line-height: 1.8;
      color: #333;
    }

    .result-justification p {
      margin-bottom: 16px;
    }

    .result-justification p:last-child {
      margin-bottom: 0;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .share-btn {
      font-family: 'Jost', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #111111;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .share-btn:hover {
      background: #333;
      transform: translateY(-1px);
    }

    .share-btn:disabled {
      background: #888;
      cursor: not-allowed;
      transform: none;
    }

    .try-again-btn {
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: none;
      border: 2px solid #223c6f;
      color: #223c6f;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .try-again-btn:hover {
      background: #223c6f;
      color: #fff;
    }

    .footer {
      background-color: #111111;
      border-top: 4px solid #111111;
      text-align: center;
      padding: 32px 20px;
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .footer-text {
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      color: #8c8a80;
    }

    .footer-text a {
      color: #f2f0e6;
      text-decoration: none;
      border-bottom: 1px solid #ff4400;
      transition: color 0.2s;
    }

    .footer-text a:hover {
      color: #ff4400;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 36px;
      }

      .result-card {
        padding: 32px 24px;
      }

      .result-premise {
        font-size: 22px;
      }

      .result-actions {
        flex-direction: column;
        align-items: center;
      }

      .share-btn, .try-again-btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="hero">
      <h1>Because <span class="accent">China</span></h1>
      <p class="subtitle">Justify anything through the lens of great power competition.</p>
      <p class="tagline">A whole-of-society rationale generator</p>
    </div>

    <div class="input-section" id="inputSection">
      <label class="input-label" for="userInput">What do you need to rationalize?</label>
      <textarea class="input-box" id="userInput" placeholder="e.g. &quot;We need to invest in high-speed rail&quot; or &quot;I should buy a new espresso machine&quot;"></textarea>
      <button class="generate-btn" id="generateBtn">Initiate</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">Consulting RAND, CSIS, and three former deputy assistant secretaries...</p>
    </div>

    <div class="result" id="result">
      <div class="result-card">
        <div class="result-premise-label">Strategic Justification</div>
        <h2 class="result-premise" id="resultPremise"></h2>
        <div class="result-divider"></div>
        <p class="result-justification" id="resultJustification"></p>
      </div>
      <div class="result-actions">
        <button class="share-btn" id="shareBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download Image
        </button>
        <button class="try-again-btn" id="tryAgainBtn">Justify Something Else</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <p class="footer-text">A Project of the <a href="https://defenseanalyses.org/" target="_blank" rel="noopener">Defense Analyses and Research Corporation</a></p>
    </div>
  </footer>

  <script>
    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const API_URL = isLocal
      ? '/api/generate'
      : 'https://because-china.vercel.app/api/generate';

    const userInput = document.getElementById('userInput');
    const generateBtn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const inputSection = document.getElementById('inputSection');
    const resultPremise = document.getElementById('resultPremise');
    const resultJustification = document.getElementById('resultJustification');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const shareBtn = document.getElementById('shareBtn');
    const SHARE_BTN_HTML = shareBtn.innerHTML;

    let currentShortJustification = '';

    const loadingMessages = [
      'Consulting RAND, CSIS, and three former deputy assistant secretaries...',
      'Cross-referencing with classified INDOPACOM threat assessments...',
      'Reviewing Beijing\'s latest Five-Year Plan for relevant vulnerabilities...',
      'Convening an emergency interagency working group...',
      'Scanning Thousand Talents Program databases for corroborating evidence...',
      'Briefing a former National Security Advisor on the implications...',
      'Analyzing satellite imagery of Shenzhen for supporting intelligence...',
      'Polling the Hudson Institute, AEI, and two Brookings fellows...',
      'Running this through the whole-of-government threat matrix...',
      'Checking if this was already in the 2024 Annual Threat Assessment...',
    ];

    const loadingText = document.querySelector('.loading-text');

    generateBtn.addEventListener('click', generate);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generate();
      }
    });

    async function generate() {
      const input = userInput.value.trim();
      if (!input) return;

      generateBtn.disabled = true;
      generateBtn.textContent = 'Initiating...';
      loadingText.textContent = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
      loading.style.display = 'block';
      result.style.display = 'none';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input }),
        });

        const data = await response.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
        }

        resultPremise.textContent = input;
        resultJustification.innerHTML = data.justification
          .split('\n\n')
          .filter(p => p.trim())
          .map(p => `<p>${p}</p>`)
          .join('');

        currentShortJustification = data.shortJustification || data.justification.split('.')[0] + '.';

        inputSection.style.display = 'none';
        result.style.display = 'block';
        result.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert('Something went wrong. Is the server running?');
        console.error(err);
      } finally {
        loading.style.display = 'none';
        generateBtn.disabled = false;
        generateBtn.textContent = 'Initiate';
      }
    }

    tryAgainBtn.addEventListener('click', () => {
      result.style.display = 'none';
      inputSection.style.display = 'block';
      userInput.value = '';
      userInput.focus();
    });

    // ---- Share Image Generation ----

    async function ensureFontsLoaded() {
      await document.fonts.load('900 48px Jost');
      await document.fonts.load('700 28px Jost');
      await document.fonts.load('italic 24px "Libre Baskerville"');
      await document.fonts.load('400 30px "Libre Baskerville"');
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines, measureOnly) {
      const words = text.split(' ');
      let line = '';
      let lineCount = 0;
      let startY = y;

      for (let i = 0; i < words.length; i++) {
        const testLine = line + words[i] + ' ';
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && line !== '') {
          lineCount++;
          if (maxLines && lineCount >= maxLines) {
            if (!measureOnly) ctx.fillText(line.trim() + '...', x, y);
            return y + lineHeight;
          }
          if (!measureOnly) ctx.fillText(line.trim(), x, y);
          line = words[i] + ' ';
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      if (!measureOnly) ctx.fillText(line.trim(), x, y);
      return y + lineHeight;
    }

    function drawTextWithSpacing(ctx, text, x, y, spacing) {
      if ('letterSpacing' in ctx) {
        ctx.letterSpacing = spacing + 'px';
        ctx.fillText(text, x, y);
        ctx.letterSpacing = '0px';
      } else {
        let currentX = x;
        for (const ch of text) {
          ctx.fillText(ch, currentX, y);
          currentX += ctx.measureText(ch).width + spacing;
        }
      }
    }

    function getFirstParagraph() {
      const paragraphs = resultJustification.querySelectorAll('p');
      if (paragraphs.length === 0) return resultJustification.textContent;
      return paragraphs[0].textContent;
    }

    // Split into sentences, respecting abbreviations like U.S., Dr., etc.
    function breakIntoChunks(text, sentencesPerChunk) {
      const sentences = text.match(/[^.!?]*(?:[A-Z]\.)+[^.!?]*[.!?]+|[^.!?]+[.!?]+/g) || [text];
      const chunks = [];
      for (let i = 0; i < sentences.length; i += sentencesPerChunk) {
        chunks.push(sentences.slice(i, i + sentencesPerChunk).join('').trim());
      }
      return chunks;
    }

    async function generateShareImage() {
      await ensureFontsLoaded();

      const S = 1080;
      const canvas = document.createElement('canvas');
      canvas.width = S;
      canvas.height = S;
      const ctx = canvas.getContext('2d');
      const pad = 64;
      const contentW = S - pad * 2;

      // === Cream background matching site ===
      ctx.fillStyle = '#f2f0e6';
      ctx.fillRect(0, 0, S, S);

      // === "BECAUSE CHINA" title on one line ===
      let titleY = pad + 80;
      ctx.font = '900 64px Jost, Futura, sans-serif';
      ctx.textAlign = 'center';
      const becauseW = ctx.measureText('BECAUSE ').width;
      const chinaW = ctx.measureText('CHINA').width;
      const totalW = becauseW + chinaW;
      const startX = (S - totalW) / 2;
      ctx.fillStyle = '#111111';
      ctx.textAlign = 'left';
      ctx.fillText('BECAUSE ', startX, titleY);
      ctx.fillStyle = '#ff4400';
      ctx.fillText('CHINA', startX + becauseW, titleY);

      // Orange accent line
      const lineY = titleY + 30;
      ctx.fillStyle = '#ff4400';
      ctx.textAlign = 'center';
      ctx.fillRect(S / 2 - 40, lineY, 80, 3);

      // === Premise - larger font ===
      const premiseY = lineY + 55;
      ctx.font = 'italic 40px "Libre Baskerville", Georgia, serif';
      ctx.fillStyle = '#555555';
      ctx.textAlign = 'center';

      const premise = '\u201C' + resultPremise.textContent + '\u201D';
      const premiseWords = premise.split(' ');
      let premiseLine = '';
      let premiseLineY = premiseY;
      const premiseMaxW = contentW - 40;
      for (let i = 0; i < premiseWords.length; i++) {
        const testLine = premiseLine + premiseWords[i] + ' ';
        if (ctx.measureText(testLine).width > premiseMaxW && premiseLine !== '') {
          ctx.fillText(premiseLine.trim(), S / 2, premiseLineY);
          premiseLine = premiseWords[i] + ' ';
          premiseLineY += 52;
        } else {
          premiseLine = testLine;
        }
      }
      ctx.fillText(premiseLine.trim(), S / 2, premiseLineY);

      // === Body text - first paragraph only, larger font ===
      const footerReserve = 50;
      const bodyStartY = premiseLineY + 80;
      const bodyEndY = S - pad - footerReserve;
      const availableH = bodyEndY - bodyStartY;

      const bodyText = getFirstParagraph();
      const chunks = breakIntoChunks(bodyText, 2);

      // Try font sizes from large to small to find best fit
      let bestFontSize = 42;
      let bestLineHeight = 60;
      const paraGap = 24;

      for (let fs = 42; fs >= 26; fs -= 2) {
        const lh = Math.round(fs * 1.42);
        ctx.font = `400 ${fs}px "Libre Baskerville", Georgia, serif`;

        // Measure total height
        let totalH = 0;
        for (let c = 0; c < chunks.length; c++) {
          const endY = wrapText(ctx, chunks[c], pad, 0, contentW, lh, null, true);
          totalH += endY;
          if (c < chunks.length - 1) totalH += paraGap;
        }

        if (totalH <= availableH) {
          bestFontSize = fs;
          bestLineHeight = lh;
          break;
        }
      }

      // Draw body text
      ctx.font = `400 ${bestFontSize}px "Libre Baskerville", Georgia, serif`;
      ctx.fillStyle = '#333333';
      ctx.textAlign = 'left';

      let curY = bodyStartY;
      for (let c = 0; c < chunks.length; c++) {
        curY = wrapText(ctx, chunks[c], pad, curY, contentW, bestLineHeight, null, false);
        if (c < chunks.length - 1) curY += paraGap;
      }

      // === Bottom: URL ===
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(pad, S - pad - 30, contentW, 1);

      ctx.font = '600 16px Jost, sans-serif';
      ctx.fillStyle = '#999999';
      ctx.textAlign = 'center';
      drawTextWithSpacing(ctx, 'DEFENSEANALYSES.ORG', S / 2, S - pad, 3);

      return canvas;
    }

    function downloadImage(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    shareBtn.addEventListener('click', async () => {
      shareBtn.disabled = true;
      shareBtn.textContent = 'Generating...';

      try {
        const canvas = await generateShareImage();
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        downloadImage(blob, 'because-china.png');
      } catch (err) {
        console.error('Share image generation failed:', err);
        alert('Failed to generate image. Please try again.');
      } finally {
        shareBtn.disabled = false;
        shareBtn.innerHTML = SHARE_BTN_HTML;
      }
    });
  </script>
</body>
</html>
